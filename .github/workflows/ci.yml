name: Afyalink Foundation CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api-foundation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - run: composer dump-autoload
      - run: composer check

