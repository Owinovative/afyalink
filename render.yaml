services:
  - type: web
    name: afyalink-api-staging
    runtime: docker
    rootDir: apps/api
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: staging
      - key: APP_URL
        sync: false
      - key: API_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: AFYALINK_DATASTORE
        value: pgsql
      - key: DATABASE_URL
        sync: false
      - key: AFYALINK_CREDENTIAL_STORAGE
        value: local
      - key: AFYALINK_LOCAL_CREDENTIAL_ROOT
        value: /tmp/afyalink/credentials
      - key: AFYALINK_SESSION_TTL_SECONDS
        value: "43200"
      - key: AFYALINK_EMAIL_VERIFICATION_TTL_SECONDS
        value: "86400"
      - key: AFYALINK_PASSWORD_RESET_TTL_SECONDS
        value: "3600"
      - key: AFYALINK_MAX_UPLOAD_BYTES
        value: "8388608"

  - type: web
    name: afyalink-web-staging
    runtime: static
    rootDir: apps/web
    buildCommand: npm install && npm run build:render
    staticPublishPath: ./dist
    envVars:
      - key: AFYA_API_BASE
        sync: false

