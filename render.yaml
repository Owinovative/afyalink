services:
  - type: web
    name: afyalink-api-staging
    runtime: docker
    rootDir: apps/api
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    preDeployCommand: php scripts/migrate.php
    envVars:
      - key: APP_ENV
        value: staging
      - key: APP_URL
        sync: false
      - key: API_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: AFYALINK_DATASTORE
        value: pgsql
      - key: DATABASE_URL
        sync: false
      - key: AFYALINK_CREDENTIAL_STORAGE
        value: r2
      - key: AFYALINK_LOCAL_CREDENTIAL_ROOT
        value: /tmp/afyalink/credentials
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: AFYALINK_SESSION_TTL_SECONDS
        value: "43200"
      - key: AFYALINK_EMAIL_VERIFICATION_TTL_SECONDS
        value: "86400"
      - key: AFYALINK_PASSWORD_RESET_TTL_SECONDS
        value: "3600"
      - key: AFYALINK_MAX_UPLOAD_BYTES
        value: "8388608"
      - key: MAIL_DRIVER
        value: log
      - key: MAIL_FROM_ADDRESS
        value: no-reply@afyalinks.org
      - key: MAIL_FROM_NAME
        value: Afyalink
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_ENCRYPTION
        value: tls
      - key: SUPPORT_EMAIL
        value: support@afyalinks.org
      - key: PUBLIC_CONTACT_EMAIL
        value: info@afyalinks.org
      - key: ADMIN_EMAIL
        value: admin@afyalinks.org
      - key: MPESA_ENV
        value: sandbox
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false
      - key: AI_RECOMMENDATION_DRIVER
        value: local
      - key: AI_PROVIDER
        sync: false
      - key: AI_MODEL
        sync: false
      - key: AI_API_KEY
        sync: false

  - type: web
    name: afyalink-web-staging
    runtime: node
    rootDir: apps/web
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start -- -p $PORT
    envVars:
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_AFYA_API_BASE
        sync: false

  - type: cron
    name: afyalink-notifications-staging
    runtime: docker
    rootDir: apps/api
    plan: starter
    dockerfilePath: ./Dockerfile
    schedule: "*/15 * * * *"
    dockerCommand: php scripts/process-notifications.php 50
    envVars:
      - key: APP_ENV
        value: staging
      - key: APP_URL
        sync: false
      - key: API_URL
        sync: false
      - key: AFYALINK_DATASTORE
        value: pgsql
      - key: DATABASE_URL
        sync: false
      - key: AFYALINK_CREDENTIAL_STORAGE
        value: r2
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: MAIL_DRIVER
        value: log
      - key: MAIL_FROM_ADDRESS
        value: no-reply@afyalinks.org
      - key: MAIL_FROM_NAME
        value: Afyalink
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_ENCRYPTION
        value: tls
      - key: SUPPORT_EMAIL
        value: support@afyalinks.org
      - key: PUBLIC_CONTACT_EMAIL
        value: info@afyalinks.org
      - key: ADMIN_EMAIL
        value: admin@afyalinks.org

